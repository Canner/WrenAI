name: order_metrics
base_object: orders
measures:
  - name: total_revenue
    expression: SUM(amount)
    type: DOUBLE
  - name: order_count
    expression: COUNT(*)
    type: BIGINT
dimensions:
  - name: customer_id
    expression: customer_id
    type: INTEGER
properties:
  description: Pre-aggregated order revenue and counts per customer.
