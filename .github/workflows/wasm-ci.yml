name: WASM SDK
permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - 'core/wren-core-wasm/**'
      - 'core/wren-core/core/**'
      - 'core/wren-core-base/**'
  pull_request:
    paths:
      - 'core/wren-core-wasm/**'
      - 'core/wren-core/core/**'
      - 'core/wren-core-base/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.sha }}
  cancel-in-progress: true

jobs:
  build:
    name: Build WASM + TypeScript SDK
    runs-on: ubuntu-latest
    timeout-minutes: ${{ github.event_name == 'pull_request' && 20 || 40 }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        id: cargo-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            core/wren-core-wasm/target/
          key: wasm-cargo-${{ hashFiles('core/wren-core-wasm/Cargo.toml', 'core/wren-core-wasm/Cargo.lock') }}
          restore-keys: wasm-cargo-

      - name: Install wasm-pack
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack@0.14.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install npm dependencies
        working-directory: core/wren-core-wasm
        run: npm install

      - name: Record build start
        run: echo "WASM_BUILD_START=$(date +%s)" >> "$GITHUB_ENV"

      - name: Build WASM (PR fast path, release --no-opt)
        if: github.event_name == 'pull_request'
        working-directory: core/wren-core-wasm
        run: wasm-pack build --target web --release --no-opt

      - name: Build WASM (optimized)
        if: github.event_name != 'pull_request'
        working-directory: core/wren-core-wasm
        run: wasm-pack build --target web --release

      - name: Report build metrics
        if: ${{ !cancelled() && env.WASM_BUILD_START != '' }}
        run: |
          {
            echo "### WASM build"
            echo "- Mode: ${{ github.event_name == 'pull_request' && 'release --no-opt (PR fast path)' || 'release + wasm-opt (optimized)' }}"
            echo "- Cargo cache exact hit: ${{ steps.cargo-cache.outputs.cache-hit == 'true' }}"
            echo "- wasm-pack phase: $(( $(date +%s) - WASM_BUILD_START ))s"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build dist (TypeScript + copy)
        working-directory: core/wren-core-wasm
        run: npm run build:dist

      - name: TypeScript typecheck
        working-directory: core/wren-core-wasm
        run: npm run typecheck

      - name: WASM binary size check (optimized artifact only)
        if: github.event_name != 'pull_request'
        working-directory: core/wren-core-wasm
        run: npm run check:size

      - name: Run integration tests
        working-directory: core/wren-core-wasm
        run: npm test

      - name: Upload dist artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: wasm-sdk-dist
          path: core/wren-core-wasm/dist/
          retention-days: 30
